<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#111827" />
<title>료진 N2 단어장</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--accent:#111827;--soft:#eef2ff;--ok:#16a34a;--bad:#dc2626;--shadow:0 10px 25px rgba(17,24,39,.08);--r:22px}
*{box-sizing:border-box}html,body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif;background:linear-gradient(180deg,#f8fafc,#eef2ff);color:var(--ink)}
button,input,select{font:inherit}button{border:0;cursor:pointer}.app{min-height:100dvh;display:grid;grid-template-columns:320px 1fr;gap:18px;padding:18px;max-width:1450px;margin:0 auto}
.side{position:sticky;top:18px;height:calc(100dvh - 36px);overflow:auto;background:rgba(255,255,255,.78);backdrop-filter:blur(14px);border:1px solid rgba(229,231,235,.9);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.brand{font-weight:900;font-size:22px;letter-spacing:-.5px}.sub{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.45}.pillrow{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.pill{padding:9px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);font-weight:800;font-size:13px}.pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}.stat b{display:block;font-size:22px}.stat span{font-size:12px;color:var(--muted)}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:10px}.bar{height:100%;width:0;background:linear-gradient(90deg,#111827,#64748b)}
.pages{display:grid;gap:8px;margin-top:12px}.pagebtn{width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px;border-radius:15px;background:#fff;border:1px solid var(--line);text-align:left}.pagebtn.on{outline:2px solid var(--accent)}.pagebtn .t{font-weight:900}.pagebtn .n{font-size:12px;color:var(--muted)}
.main{display:flex;flex-direction:column;gap:16px}.top{position:sticky;top:18px;z-index:10;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border:1px solid rgba(229,231,235,.9);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;display:grid;gap:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.grow{flex:1}.search{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:15px;background:#fff}.select{padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff;font-weight:800}.btn{padding:12px 14px;border-radius:14px;background:var(--accent);color:#fff;font-weight:900}.btn.light{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn.good{background:var(--ok)}.btn.bad{background:var(--bad)}
.panel{background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}.title{font-size:26px;font-weight:950;letter-spacing:-.6px;margin:0}.muted{color:var(--muted)}
.flash{min-height:330px;display:grid;place-items:center;text-align:center;border-radius:26px;background:radial-gradient(circle at top left,#fff,#f8fafc 55%,#eef2ff);border:1px solid var(--line);padding:28px;user-select:none}.word{font-size:clamp(48px,9vw,96px);font-weight:950;line-height:1}.reading{font-size:clamp(22px,4vw,40px);font-weight:800;margin-top:14px;color:#374151}.meaning{font-size:clamp(26px,5vw,48px);font-weight:950;margin-top:18px}.hint{margin-top:16px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px;display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start}.check{width:24px;height:24px;accent-color:#111827;margin-top:4px}.jp{font-weight:950;font-size:23px}.rd{font-weight:800;color:#374151}.kr{color:#111827;margin-top:4px}.done .jp,.done .rd,.done .kr{opacity:.42;text-decoration:line-through}
.quiz{display:grid;gap:12px}.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.choice{padding:16px;border-radius:16px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.choice.correct{outline:3px solid var(--ok)}.choice.wrong{outline:3px solid var(--bad)}
.mobilePages{display:none}.footer{font-size:12px;color:var(--muted);text-align:center;padding:10px 0 30px}
@media(max-width:900px){.app{display:block;padding:10px}.side{display:none}.top{top:8px;border-radius:18px;padding:10px}.mobilePages{display:block;width:100%}.panel{padding:14px;border-radius:18px}.choices{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.btn,.select{padding:11px 12px}.title{font-size:22px}}
@media(min-width:901px){.desktopOnly{display:inline-flex}}
</style>
</head><body>
<div class="app">
  <aside class="side">
    <div class="brand">📚 료진 N2 단어장</div>
    <div class="sub">PDF 페이지 그대로. 명사/동사/형용사 페이지별 체크, 가리기, 랜덤 테스트.</div>
    <div class="pillrow" id="cats"></div>
    <div class="stats"><div class="stat"><b id="doneCount">0</b><span>외운 단어</span></div><div class="stat"><b id="rate">0%</b><span>현재 범위 암기율</span></div></div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="pages" id="pageList"></div>
  </aside>
  <main class="main">
    <section class="top">
      <div class="row">
        <select class="select mobilePages" id="pageSelect"></select>
        <select class="select" id="mode"><option value="flash">카드 암기</option><option value="list">전체 체크</option><option value="quiz">랜덤 시험</option></select>
        <input class="search grow" id="q" placeholder="검색: 한자 / 히라가나 / 뜻" />
      </div>
      <div class="row">
        <button class="btn light" id="shuffle">랜덤 섞기</button>
        <button class="btn light" id="hideToggle">뜻 가리기 ON</button>
        <button class="btn good" id="markKnown">현재 단어 외움</button>
        <button class="btn bad" id="resetPage">이 페이지 체크 초기화</button>
      </div>
    </section>
    <section class="panel">
      <h1 class="title" id="pageTitle"></h1>
      <div class="muted" id="pageInfo"></div>
    </section>
    <section class="panel" id="content"></section>
    <div class="footer">체크 기록은 이 브라우저에 자동 저장됨. 파일을 복사하거나 다른 브라우저로 열면 기록은 따로 관리됨.</div>
  </main>
</div>
